<html lang="pt">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EJ Conforto | Sofás, Camas e Móveis em Angola</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
color:#222;
}

/* HEADER */

header{
background:#0a1a2f;
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.logo{
font-size:32px;
font-weight:bold;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
font-size:18px;
}

/* HERO */

.hero{
height:550px;

background:
linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url('banner.jpg');

background-size:cover;
background-position:center;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;
color:white;
padding:20px;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero p{
font-size:24px;
margin-bottom:30px;
}

.hero button{
padding:15px 30px;
background:#d4af37;
border:none;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

/* PROMO */

.promo{
background:#d4af37;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* SECTIONS */

section{
padding:60px 20px;
}

section h2{
text-align:center;
font-size:42px;
margin-bottom:40px;
}

/* GRID */

.grid{
display:flex;
flex-wrap:wrap;
gap:25px;
justify-content:center;
}

/* CARD */

.card{
background:white;
width:300px;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.card h3{
padding:15px;
font-size:24px;
}

.old{
padding:0 15px;
text-decoration:line-through;
color:red;
}

.preco{
padding:0 15px;
font-size:26px;
color:#d4af37;
font-weight:bold;
}

.btn{
display:block;
margin:10px 15px;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
width:calc(100% - 30px);
}

.cart{
background:#0a1a2f;
color:white;
}

.buy{
background:#25D366;
color:white;
}

/* CARRINHO */

#carrinho{
position:fixed;
top:20px;
right:20px;

width:340px;
max-height:500px;

overflow:auto;

background:white;
padding:20px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,0.2);

z-index:999;
}

#lista img{
width:70px;
height:70px;
object-fit:cover;
border-radius:10px;
}

.item{
display:flex;
gap:10px;
margin-bottom:15px;
border-bottom:1px solid #ddd;
padding-bottom:10px;
}

.remove{
background:red;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

/* BENEFÍCIOS */

.beneficios{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.beneficio{
background:white;
padding:30px;
width:250px;
text-align:center;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* FOOTER */

footer{
background:#0a1a2f
