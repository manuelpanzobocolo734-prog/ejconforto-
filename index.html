<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EJ Conforto</title>

<style>
body {
margin:0;
font-family: Arial;
background:#f4f4f4;
}

/* HEADER */
header {
background:#0a1a2f;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1 {
margin:0;
}

/* HERO */
.hero {
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)), url('banner.jpg');
background-size:cover;
color:white;
text-align:center;
padding:80px 20px;
}

.hero h2 {
font-size:30px;
}

/* PRODUTOS */
.produtos {
padding:30px;
text-align:center;
}

.grid {
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.card {
background:white;
width:260px;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover {
transform:scale(1.05);
}

.card img {
width:100%;
height:200px;
object-fit:cover;
}

.preco {
color:#d4af37;
font-weight:bold;
}

.botao {
display:block;
margin:10px;
padding:10px;
background:#0a1a2f;
color:white;
text-decoration:none;
border-radius:5px;
}

/* WHATSAPP FIXO */
.whatsapp {
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:20px;
text-decoration:none;
}

/* FOOTER */
footer {
background:#0a1a2f;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}
</style>
</head>

<body>

<header>
<h1>EJ Conforto</h1>
<p>Emanuel e Josefina</p>
</header>

<section class="hero">
<h2>Conforto que transforma o seu lar</h2>
<p>Sofás nacionais com qualidade</p>
</section>

<section class="produtos">
<h2>Nossos Sofás</h2>

<div class="grid">

<div class="card">
<img src="sofa-preto.jpg">
<h3>Sofá Preto</h3>
<p class="preco">210.000 Kz</p>
<a class="botao" href="https://wa.me/244926341670?text=Quero o Sofá Preto">Comprar</a>
</div>

<div class="card">
<img src="sofa-cinza.jpg">
<h3>Sofá Cinza</h3>
<p class="preco">180.000 Kz
